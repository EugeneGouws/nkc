[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Local dev: `netlify dev` starts Vite on 5173, proxies through 8888
# Functions available at localhost:8888/.netlify/functions/<name>
# /api/* redirects below work automatically through the proxy
[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
